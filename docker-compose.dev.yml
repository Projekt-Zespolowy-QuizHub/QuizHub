services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizarena
      POSTGRES_USER: quizarena
      POSTGRES_PASSWORD: quizarena_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quizarena_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizarena -d quizarena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - quizarena_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/dev/Dockerfile.backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      DB_ENGINE: postgresql
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quizarena_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/dev/Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - quizarena_net

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  quizarena_net:
    driver: bridge
