name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: pytest + flake8 ──────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run pytest
        env:
          DJANGO_SECRET_KEY: ci-secret-key
        run: pytest --tb=short -q

      - name: Run flake8 lint
        run: |
          flake8 apps/ quizarena/ \
            --max-line-length=120 \
            --extend-ignore=W503,W504,E501 \
            --statistics

  # ── Frontend: tsc + build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
        run: npm run build

  # ── Docker build verification ─────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/dev/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dev frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/dev/Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build prod backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/prod/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build prod frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/prod/Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
